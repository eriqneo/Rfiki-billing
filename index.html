<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rafiki Business Manager</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png">
    <link rel="manifest" href="/manifest.json" />
    <script>
      (function() {
        // Protect fetch from polyfill attempts early
        try {
          var originalFetch = window.fetch;
          var fetchDescriptor = {
            get: function() { return originalFetch; },
            set: function(v) { console.warn('[RAFIKI] Blocked fetch override.'); },
            configurable: true,
            enumerable: true
          };

          // Protect main global objects
          try { Object.defineProperty(window, 'fetch', fetchDescriptor); } catch (e) {}
          
          // Ensure global and globalThis are defined and protected
          if (typeof window.global === 'undefined') {
            try { window.global = window; } catch (e) {}
          }
          if (typeof window.globalThis === 'undefined') {
            try { window.globalThis = window; } catch (e) {}
          }

          try { Object.defineProperty(window.global, 'fetch', fetchDescriptor); } catch (e) {}
          try { Object.defineProperty(window.globalThis, 'fetch', fetchDescriptor); } catch (e) {}
          
        } catch (e) {
          console.error('[RAFIKI] Early bootstrap failure:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
